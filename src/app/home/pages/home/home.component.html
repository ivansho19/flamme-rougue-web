<div class="home-container" *ngIf="!loader">
  <!-- BANNER -->
  <section>
    <app-banner-carousel [items]="carouselItems"></app-banner-carousel>
  </section>

  
<div class="container text-center">
  <div class="row">
    <div class="col-3" *ngFor="let card of anunciantes">
      <app-card [image]="card.img" [title]="card.nombre" [describe]="card.descripcion" [age]="card.age"
        [buttonUrl]="'/profile/' + card.id" (click)="goToProfile(card.id)"></app-card>
    </div>
  </div>
</div>

</div>
<app-loader *ngIf="loader" [loaderFirstTime]="true"></app-loader>
