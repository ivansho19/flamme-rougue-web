<div class="payment-box">
  <h2>Pago con tarjeta</h2>
  <form class="payment-form" (ngSubmit)="pay()">
    <div class="form-group">
      <label for="cardholder">Titular de la tarjeta</label>
      <input id="cardholder" type="text" class="form-control" placeholder="Nombre como aparece en la tarjeta" required>
    </div>
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" class="form-control" placeholder="tu@email.com" required>
    </div>
    <div class="form-group">
      <label for="card-element">Datos de la tarjeta</label>
      <div id="card-element" class="card-element"></div>
    </div>
    <button class="btn-custom" type="submit">Pagar</button>
  </form>
</div>
