<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()"></div>

<div class="modal-container" *ngIf="isOpen">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="header-content">
        <h2>{{ 'COMMENT_PLANS.MODAL_TITLE' | translate }}</h2>
        <p class="subtitle">{{ 'COMMENT_PLANS.MODAL_SUBTITLE' | translate }}</p>
      </div>
      <button class="close-btn" type="button" (click)="onClose()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="plans-container">
      <div
        class="plan-card"
        *ngFor="let plan of plans"
        [class.selected]="selectedPlanId === plan.id"
        [class.disabled]="!plan.selectable"
        (click)="selectPlan(plan.id)">
        <div class="plan-header">
          <div class="plan-title-block">
            <h3>{{ plan.name | translate }}</h3>
            <app-comment-plan-badge
              *ngIf="plan.badgeType"
              [badgeType]="plan.badgeType"
            ></app-comment-plan-badge>
          </div>
        </div>

        <div class="plan-price">
          <span class="price">{{ plan.price }}</span>
          <span class="period">/ {{ plan.period | translate }}</span>
        </div>

        <ul class="plan-features">
          <li *ngFor="let feature of plan.features">
            <i class="bi bi-check2" aria-hidden="true"></i>
            <span>{{ feature | translate }}</span>
          </li>
        </ul>

        <div class="plan-check" *ngIf="selectedPlanId === plan.id && plan.selectable">
          <i class="bi bi-check-circle-fill"></i>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" type="button" (click)="onClose()">
        {{ 'COMMENT_PLANS.MODAL_CLOSE' | translate }}
      </button>
      <div class="payment-actions">
        <div class="paypal-wrapper">
          <div #paypalButtons></div>
          <div class="error" *ngIf="paypalError">{{ paypalError }}</div>
        </div>
        <button class="btn btn-whatsapp" type="button" (click)="openWhatsAppConfirm()">
          Pagar via <i class="bi bi-whatsapp"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<app-confirm-action-modal
  [isOpen]="isWhatsAppConfirmOpen"
  [title]="'WHATSAPP_CONFIRM.TITLE' | translate"
  [message]="'WHATSAPP_CONFIRM.COMMENT_PLANS_MESSAGE' | translate"
  [confirmLabel]="'WHATSAPP_CONFIRM.CTA' | translate"
  [cancelLabel]="'COMMON.CANCEL' | translate"
  (confirm)="confirmWhatsAppPayment()"
  (cancel)="closeWhatsAppConfirm()">
</app-confirm-action-modal>
