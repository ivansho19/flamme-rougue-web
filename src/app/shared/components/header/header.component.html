<header class="header">
    <div class="logo" (click)="navigateToHome()">
        <img src="assets/images/logo_mini.png" alt="Logo" width="32" height="32">
        <span class="logo-text">Flamme Rouge</span>
    </div>

    <!-- 🖥️ Menú Desktop -->
    <div class="header-right desktop-menu">
        <span class="username" *ngIf="getUserName()">{{ 'HEADER.GREETING' | translate }}, {{ getUserName() }}</span>
        <div class="header-icons">
            <button class="icon-btn" [title]="'HEADER.SEARCH' | translate" (click)="toggleSearch()"><i class="bi bi-search"></i></button>
            <button (click)="navigateToProfile()" class="icon-btn" [title]="'HEADER.PROFILE' | translate"><i class="bi bi-person"></i></button>
            <div class="dropdown-flag">
                <button class="icon-btn dropdown-toggle" type="button" (click)="toggleDropdown()"
                    [attr.aria-expanded]="dropdownOpen" aria-haspopup="true">
                    <img [src]="selectedFlagUrl" class="flag-img" [alt]="'HEADER.CURRENT_LANG' | translate" />
                </button>
                <div class="dropdown-menu" [class.show]="dropdownOpen">
                    <button class="dropdown-item" *ngFor="let flag of flagOptions" (click)="setFlag(flag)"
                        [attr.aria-label]="flag.label">
                        <img [src]="flag.url" class="flag-img" [alt]="flag.label" />
                    </button>
                </div>
            </div>
            <button class="publish-top-btn" *ngIf="getUserName()" (click)="openTopRojoModal()" [title]="'HEADER.PUBLISH_TOP' | translate">
                <i class="bi bi-star-fill"></i> {{ 'HEADER.PUBLISH_TOP' | translate }}
            </button>
            <button class="icon-btn" *ngIf="getUserName()" (click)="logout()"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </div>

    <!-- ☰ Botón Hamburguesa (Mobile) -->
    <button class="mobile-toggle" [class.active]="mobileMenuOpen" (click)="toggleMobileMenu()" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- 📱 Menú Mobile -->
    <nav class="mobile-menu" [class.show]="mobileMenuOpen">
        <div class="mobile-menu-items">
            <span class="mobile-username" *ngIf="getUserName()">{{ getUserName() }}</span>
            <button class="mobile-item" type="button" (click)="toggleSearch(); closeMobileMenu()">
                <i class="bi bi-search"></i> {{ 'HEADER.SEARCH' | translate }}
            </button>
            <button class="mobile-item" type="button" (click)="navigateToProfile(); closeMobileMenu()">
                <i class="bi bi-person"></i> {{ 'HEADER.PROFILE' | translate }}
            </button>
            <button class="mobile-item publish-top" type="button" *ngIf="getUserName()" (click)="openTopRojoModal(); closeMobileMenu()">
                <i class="bi bi-star-fill"></i> {{ 'HEADER.PUBLISH_TOP' | translate }}
            </button>
            <div class="mobile-divider"></div>
            <div class="mobile-languages">
                <button class="mobile-lang-item" *ngFor="let flag of flagOptions" 
                    (click)="setFlag(flag); closeMobileMenu()"
                    [class.active]="flag.lang === currentLang">
                    <img [src]="flag.url" class="flag-img-mobile" [alt]="flag.label" />
                    <span>{{ flag.label }}</span>
                </button>
            </div>
            <div class="mobile-divider"></div>
            <button class="mobile-item logout" type="button" *ngIf="getUserName()" (click)="logout(); closeMobileMenu()">
                <i class="bi bi-box-arrow-right"></i> {{ 'HEADER.LOGOUT' | translate }}
            </button>
        </div>
    </nav>
</header>

<div class="search-backdrop" *ngIf="searchOpen" (click)="toggleSearch()"></div>
<div class="search-panel" *ngIf="searchOpen">
        <div class="search-input-wrapper">
                <input
                    #searchInput
                    type="text"
                    [placeholder]="'HEADER.SEARCH_PLACEHOLDER' | translate"
                    [value]="searchQuery"
                    (input)="onSearchInput($any($event.target).value)"
                />
                <button class="search-clear" type="button" (click)="clearSearch()" *ngIf="searchQuery">
                    ✕
                </button>
                <button class="search-btn" type="button" disabled>
                    <i class="bi bi-search"></i>
                </button>
        </div>

        <div class="search-results" *ngIf="searchQuery.length >= 3">
                <div class="search-loading" *ngIf="searchLoading">{{ 'HEADER.SEARCHING' | translate }}</div>
                <div class="search-empty" *ngIf="!searchLoading && !searchResults.length">
                    {{ 'HEADER.NO_RESULTS' | translate }}
                </div>
                <button
                    class="search-item"
                    type="button"
                    *ngFor="let result of searchResults"
                    (click)="selectProfile(result.id)"
                >
                    <img class="search-item-avatar" [src]="result.imageUrl || 'assets/images/model.webp'" alt="Imagen de perfil" />
                    <div class="search-item-text">
                        <div class="search-item-title">{{ result.name }}</div>
                        <div class="search-item-subtitle" *ngIf="result.city">{{ result.city }}</div>
                    </div>
                </button>
        </div>

        <div class="search-hint" *ngIf="searchQuery.length < 3">
                {{ 'HEADER.SEARCH_HINT' | translate }}
        </div>
</div>
