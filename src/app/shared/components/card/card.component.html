<div class="custom-card">
  <div class="card-image">
    <img [src]="image" class="custom-card-img" alt="Imagen" />
    <div class="plan-badge" *ngIf="planBadgeLabel" [ngClass]="planBadgeClass">
      {{ planBadgeLabel }}
    </div>
  </div>
  <div class="custom-card-body">
    <div class="card-row">
      <h5 class="custom-card-title">{{ title }}</h5>
      <p class="custom-card-text">{{ age }} years</p>
    </div>
    <div>
      <p class="custom-card-describe">{{ describe }}</p>
    </div>
    <div class="verified-row">
      <span class="verified-icon" aria-hidden="true">&#10003;</span>
      <span class="verified-text">Verificado</span>
      <span class="city-badge" *ngIf="city">
        <span class="city-icon material-icons" aria-hidden="true">place</span>
        <span class="city-text">{{ city }}</span>
      </span>
    </div>
  </div>
</div>
