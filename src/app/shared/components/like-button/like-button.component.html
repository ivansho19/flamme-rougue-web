<div class="like-wrapper">
  <button
    type="button"
    class="like-toggle"
    [class.active]="isActive"
    [class.animating]="animating"
    (click)="onClick()"
    aria-label="Me gusta"
  >
    <!-- Llamas de fuego -->
    <span class="flame f1"></span>
    <span class="flame f2"></span>
    <span class="flame f3"></span>
    <span class="flame f4"></span>
    <span class="flame f5"></span>
    <span class="flame f6"></span>
    <span class="flame f7"></span>
    <span class="flame f8"></span>

    <i class="bi bi-hand-thumbs-up like-icon" aria-hidden="true"></i>
    <span class="like-count">{{ likeCount }}</span>
  </button>

  <p class="like-error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</p>
</div>
