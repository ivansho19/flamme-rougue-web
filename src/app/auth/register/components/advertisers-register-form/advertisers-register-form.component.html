<div class="login-right">
    <!-- Logo -->
    <div class="logo-container">
        <img src="assets/images/logo_HD.png" alt="Logo" />
    </div>

    <!-- Caja del formulario -->
    <div class="login-box">
        <h1 class="login-title">Registro de Anunciante</h1>

        <form [formGroup]="anuncianteForm">
            <!-- Name and Lastname side by side -->
            <div class="form-row">
                <div class="form-group">
                    <input formControlName="name" required type="text" placeholder="Firstname" />
                    <div class="error"
                        *ngIf="anuncianteForm.get('name')?.touched && anuncianteForm.get('name')?.invalid">
                        <span *ngIf="anuncianteForm.get('name')?.errors?.['required']">El nombre es obligatorio</span>
                    </div>
                </div>
                <div class="form-group">
                    <input formControlName="lastName" required type="text" placeholder="Lastname" />
                    <div class="error"
                        *ngIf="anuncianteForm.get('lastName')?.touched && anuncianteForm.get('lastName')?.invalid">
                        <span *ngIf="anuncianteForm.get('lastName')?.errors?.['required']">El apellido es
                            obligatorio</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <input formControlName="email" required type="email" placeholder="Email" />
                <div class="error" *ngIf="anuncianteForm.get('email')?.touched && anuncianteForm.get('email')?.invalid">
                    <span *ngIf="anuncianteForm.get('email')?.errors?.['required']">El email es obligatorio</span>
                    <span *ngIf="anuncianteForm.get('email')?.errors?.['email']">Formato de email inválido</span>
                </div>
            </div>

            <div class="form-group">
                <app-input-custom [type]="'password'" [placeholder]="'Contraseña'" [controles]="password"
          name="password"></app-input-custom>
            </div>

            <div class="form-group">
                <app-input-custom [type]="'password'" [placeholder]="'Confirmar Contraseña'" [controles]="confirmPassword"
          name="confirmPassword"></app-input-custom>
                <div class="error"
                    *ngIf="anuncianteForm.get('confirmPassword')?.errors?.['passwordMismatch'] && anuncianteForm.get('confirmPassword')?.touched">
                    Las contraseñas no coinciden
                </div>
            </div>

            <!-- Botón -->
            <button class="btn-login" type="submit" (click)="onSubmitUser()"
                [disabled]="anuncianteForm.invalid">Registrarme</button>

            <!-- Links extra -->
            <div class="extra-links">
                <a href="/auth/login" class="link">¿Ya tienes una cuenta? Inicia sesión</a>
            </div>
        </form>
    </div>
</div>
