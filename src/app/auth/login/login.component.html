<div class="login-wrapper">
  <!-- Mitad izquierda con imagen -->
  <div class="login-left">
    <img src="assets/images/girl_login.jpg" alt="Ilustración izquierda" />
  </div>

  <!-- Mitad derecha con login -->
  <div class="login-right">
    <div class="login-topbar">
      <div class="lang-switch" aria-label="Language selector">
        <button
          class="lang-btn"
          type="button"
          *ngFor="let flag of flagOptions"
          (click)="setFlag(flag)"
          [class.active]="flag.lang === currentLang"
          [attr.aria-label]="flag.label">
          <img [src]="flag.url" [alt]="flag.label" />
        </button>
      </div>
    </div>
    <div class="logo-container">
      <img src="assets/images/logo_HD.png" alt="Flamme Rouge Logo" />
    </div>

    <div class="login-box">
      <h1 class="login-title">{{ 'LOGIN.TITLE' | translate }}</h1>
      <h2 class="login-title">{{ 'LOGIN.SUBTITLE' | translate }}</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <app-input-custom
          [type]="'email'"
          [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate"
          [controles]="emailControl"
          name="email">
        </app-input-custom>
        <app-input-custom
          [type]="'password'"
          [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate"
          [controles]="passwordControl"
          name="password">
        </app-input-custom>
         <button type="submit" class="btn-custom" [disabled]="loginForm.invalid">
          {{ 'LOGIN.SUBMIT' | translate }}
        </button>

        <div class="extra-links">
          <a routerLink="/auth/register" class="link">
            {{ 'LOGIN.NO_ACCOUNT' | translate }} {{ 'LOGIN.REGISTER' | translate }}
          </a>
          <a routerLink="/forgot-password" class="link">{{ 'LOGIN.FORGOT_PASSWORD' | translate }}</a>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Footer global -->
<footer class="page-footer">
  <p>{{ 'LOGIN.FOOTER' | translate }}</p>
</footer>
<app-loader *ngIf="loader"></app-loader>
