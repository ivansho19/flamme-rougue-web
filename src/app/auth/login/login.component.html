<div class="login-wrapper">
  <!-- Mitad izquierda con imagen -->
  <div class="login-left">
    <img src="assets/images/chica_login_new.jpeg" alt="Ilustración izquierda" />
  </div>

  <!-- Mitad derecha con login -->
  <div class="login-right">
    <div class="login-topbar">
      <a routerLink="/home" class="back-home-btn" [title]="'LOGIN.GO_HOME' | translate">
        <i class="bi bi-arrow-left"></i>
        <span>{{ 'LOGIN.GO_HOME' | translate }}</span>
      </a>
      <app-flags 
        [flagOptions]="flagOptions" 
        [selectedFlagUrl]="selectedFlagUrl" 
        [currentLang]="currentLang" 
        (translate)="setFlag($event)">
      </app-flags>
    </div>
    <div class="logo-container">
      <img src="assets/images/new_logo.png" alt="Flammes Rouges Logo" />
    </div>

    <div class="login-box">
      <h1 class="login-title">{{ 'LOGIN.TITLE' | translate }}</h1>
      <h2 class="login-title">{{ 'LOGIN.SUBTITLE' | translate }}</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <app-input-custom
          [type]="'email'"
          [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate"
          [controles]="emailControl"
          name="email">
        </app-input-custom>
        <app-input-custom
          [type]="'password'"
          [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate"
          [controles]="passwordControl"
          name="password">
        </app-input-custom>
        <!-- <div style="margin-top: 2rem;">
          <app-cf-turnstile
              [language]="currentLang"
              (tokenChange)="onTurnstileToken($event)"
              (error)="onTurnstileError()">
          </app-cf-turnstile>
          <div class="error" *ngIf="turnstileError">
              {{ 'REGISTER_FORM.TURNSTILE_LOAD_ERROR' | translate }}
          </div>
      </div> -->
         <button type="submit" class="btn-custom" [disabled]="!canSubmit">
          {{ 'LOGIN.SUBMIT' | translate }}
        </button>

        <div class="extra-links">
          <a routerLink="/auth/register" class="link">
            {{ 'LOGIN.NO_ACCOUNT' | translate }} {{ 'LOGIN.REGISTER' | translate }}
          </a>
          <!-- <a routerLink="/forgot-password" class="link">{{ 'LOGIN.FORGOT_PASSWORD' | translate }}</a> -->
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Footer global -->
<footer class="page-footer">
  <p>{{ 'LOGIN.FOOTER' | translate }}</p>
</footer>
<app-loader *ngIf="loader"></app-loader>
